components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageQuery:
      name: page
      in: query
      required: false
      description: 1-based page number. When omitted with size, defaults to 1.
      schema:
        type: integer
        minimum: 1
    SizeQuery:
      name: size
      in: query
      required: false
      description: Page size. When omitted with page, defaults to 20.
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    GenericJson:
      type: object
      additionalProperties: true
    PaginatedGenericJson:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GenericJson'
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasPrevious:
          type: boolean
        hasNext:
          type: boolean
      required:
        - items
        - page
        - size
        - total
        - totalPages
        - hasPrevious
        - hasNext
    ListOrPaginatedGenericJson:
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/GenericJson'
        - $ref: '#/components/schemas/PaginatedGenericJson'
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status
    BrandSignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        brandName:
          type: string
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - email
        - password
    LogoutRequest:
      type: object
      properties:
        accessToken:
          type: string
      required:
        - accessToken
    SocialSignupRequest:
      type: object
      properties:
        accessToken:
          type: string
          description: Optional provider access token for direct social signup
        fallbackEmail:
          type: string
          format: email
        fallbackDisplayName:
          type: string
        brandName:
          type: string
    AuthResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        brandName:
          type: string
          nullable: true
        role:
          type: string
          example: owner
        plan:
          type: string
          example: free
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        issuedAt:
          type: string
          format: date-time
      required:
        - userId
        - email
        - role
        - plan
        - accessToken
        - tokenType
        - issuedAt
    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - errorCode
        - message
