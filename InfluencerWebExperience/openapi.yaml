        '400':
          $ref: '#/components/responses/BadRequest'
  /api/campaigns:
    get:
      summary: List campaigns
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: Campaign list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrPaginatedGenericJson'
              examples:
                nonPaginated:
                  summary: Response when page and size are omitted
                  value:
                    - id: "7f6d9c90-8f77-4f73-a8af-c4b5b2e5fabc"
                      userId: "0f88ea2e-4f11-4f30-b5a6-7d8e9f10a111"
                      name: "Summer Glow Launch"
                      budget: "24000"
                      status: "active"
                paginated:
                  summary: Response when page and/or size is provided
                  value:
                    items:
                      - id: "7f6d9c90-8f77-4f73-a8af-c4b5b2e5fabc"
                        userId: "0f88ea2e-4f11-4f30-b5a6-7d8e9f10a111"
                        name: "Summer Glow Launch"
                        budget: "24000"
                        status: "active"
                    page: 1
                    size: 20
                    total: 1
                    totalPages: 1
                    hasPrevious: false
                    hasNext: false
    post:
      summary: Create campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericJson'
      responses:
        '200':
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericJson'
  /api/campaigns/{id}:
    get:
      summary: Get campaign by id
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Campaign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericJson'
    put:
      summary: Update campaign
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericJson'
      responses:
        '200':
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericJson'
    delete:
      summary: Delete campaign
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Deleted
