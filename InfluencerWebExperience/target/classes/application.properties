server.port=8081

web-experience.dao-base-url=https://localhost:8443
web-experience.session-ttl-minutes=720
web-experience.oauth.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
web-experience.oauth.google.token-uri=https://oauth2.googleapis.com/token
web-experience.oauth.google.client-id=replace-me
web-experience.oauth.google.client-secret=replace-me
web-experience.oauth.google.redirect-uri=https://localhost:8081/api/auth/oauth/google/callback
web-experience.google.userinfo-uri=https://www.googleapis.com/oauth2/v3/userinfo
web-experience.oauth.facebook.authorization-uri=https://www.facebook.com/v20.0/dialog/oauth
web-experience.oauth.facebook.token-uri=https://graph.facebook.com/v20.0/oauth/access_token
web-experience.oauth.facebook.client-id=replace-me
web-experience.oauth.facebook.client-secret=replace-me
web-experience.oauth.facebook.redirect-uri=https://localhost:8081/api/auth/oauth/facebook/callback
web-experience.facebook.userinfo-uri=https://graph.facebook.com/me?fields=id,name,email
